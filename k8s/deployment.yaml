---
apiVersion: v1
kind: Namespace
metadata:
  name: sophia-apps
---
apiVersion: v1
kind: Service
metadata:
  name: test-fakenews-killer
  namespace: sophia-apps
  labels:
    app: test-fakenews-killer
spec:
  selector:
    app: test-fakenews-killer
  ports:
    - name: http
      port: 8501
      targetPort: 8501
      protocol: TCP
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-fakenews-killer
  namespace: sophia-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-fakenews-killer
  template:
    metadata:
      labels:
        app: test-fakenews-killer
    spec:
      containers:
        - name: fakenews-killer
          image: fakenews-killer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["sh", "-c", "ps aux | grep -v grep | grep python || ps aux | grep -v grep | grep pixi"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -d /app/.pixi"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: test-fakenews-killer
  namespace: sophia-apps
spec:
  to:
    kind: Service
    name: test-fakenews-killer
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect